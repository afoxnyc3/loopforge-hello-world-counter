<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A simple counter app — click the button to increment the count." />
    <title>Hello World Counter</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <div class="counter-card">
        <h1 class="app-title">Counter</h1>
        <div class="counter-display-wrapper" aria-live="polite" aria-atomic="true">
          <span id="counter-display" class="counter-display">0</span>
        </div>
        <button id="increment-btn" class="increment-btn" type="button" aria-label="Increment counter">
          Increment
        </button>
        <button id="reset-btn" class="reset-btn" type="button" aria-label="Reset counter">
          Reset
        </button>
      </div>
    </main>
    <script src="script.js" defer></script>
  </body>
</html>
